```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>GPA Calculator</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f5f5f7;
margin:0;
display:flex;
justify-content:center;
}

.container{
width:950px;
margin-top:50px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{font-size:36px;margin-bottom:10px;}
.subtitle{color:#6e6e73;margin-bottom:30px;}

.tabs button{
background:none;
border:none;
margin-right:20px;
font-size:16px;
cursor:pointer;
padding-bottom:6px;
border-bottom:2px solid transparent;
}

.tabs button.active{
border-color:#0071e3;
color:#0071e3;
}

table{width:100%;margin-bottom:20px;}
th{color:#6e6e73;text-align:left;}
td{padding:8px 0;}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d2d2d7;
}

button.primary{
background:#0071e3;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

button.secondary{
background:#f5f5f7;
border:1px solid #ccc;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:18px;
}

.tab{display:none;}

</style>

</head>

<body>

<div class="container">

<h1>GPA Calculator</h1>
<div class="subtitle">Plan smarter for college</div>

<div class="tabs">
<button id="tab1" class="active" onclick="showTab('unweighted')">Unweighted</button>
<button id="tab2" onclick="showTab('weighted')">Weighted</button>
<button id="tab3" onclick="showTab('college')">College Suggestions</button>
</div>

<!-- UNWEIGHTED -->

<div id="unweighted" class="tab" style="display:block">

<table id="unweightedTable">
<tr>
<th>Course</th>
<th>Grade</th>
</tr>
</table>

<button class="secondary" onclick="addUnweightedCourse()">Add Course</button>
<button class="primary" onclick="calculateUnweighted()">Calculate</button>

<div class="result" id="unweightedResult"></div>

</div>

<!-- WEIGHTED -->

<div id="weighted" class="tab">

<table id="weightedTable">
<tr>
<th>Course</th>
<th>Grade</th>
<th>Level</th>
</tr>
</table>

<button class="secondary" onclick="addWeightedCourse()">Add Course</button>
<button class="primary" onclick="calculateWeighted()">Calculate</button>

<div class="result" id="weightedResult"></div>
<div class="result" id="weightedUnweightedResult"></div>

</div>

<!-- COLLEGE -->

<div id="college" class="tab">

<h3>Find Colleges</h3>

<label>GPA</label>
<input type="number" id="studentGPA" placeholder="Enter GPA">

<label>Intended Major</label>
<select id="major">
<option>Computer Science</option>
<option>Business</option>
<option>Biology</option>
<option>Engineering</option>
</select>

<br><br>

<button class="primary" onclick="suggestColleges()">Get Suggestions</button>

<div class="result" id="collegeResults"></div>

</div>

</div>

<script>

function showTab(tab){

["unweighted","weighted","college"].forEach(t=>{
document.getElementById(t).style.display="none";
});

["tab1","tab2","tab3"].forEach(t=>{
document.getElementById(t).classList.remove("active");
});

document.getElementById(tab).style.display="block";

if(tab==="unweighted") tab1.classList.add("active");
if(tab==="weighted") tab2.classList.add("active");
if(tab==="college") tab3.classList.add("active");

}

function gradeToGPA(g){
if(g>=90) return 4;
if(g>=80) return 3;
if(g>=70) return 2;
if(g>=60) return 1;
return 0;
}

function addUnweightedCourse(){
let row=document.getElementById("unweightedTable").insertRow();
row.innerHTML=`<td><input></td><td><input class="uwgrade"></td>`;
}

function calculateUnweighted(){
let grades=document.querySelectorAll(".uwgrade");
let total=0,count=0;

grades.forEach(g=>{
let val=parseFloat(g.value);
if(!isNaN(val)){total+=gradeToGPA(val);count++;}
});

let gpa=total/count;
document.getElementById("unweightedResult").innerText="GPA: "+gpa.toFixed(2);
}

function addWeightedCourse(){
let row=document.getElementById("weightedTable").insertRow();
row.innerHTML=`
<td><input></td>
<td><input class="wgrade"></td>
<td>
<select class="level">
<option value="5">Regular</option>
<option value="5.5">Honors</option>
<option value="6">AP</option>
</select>
</td>`;
}

function calculateWeighted(){

let grades=document.querySelectorAll(".wgrade");
let levels=document.querySelectorAll(".level");

let tw=0,tu=0,count=0;

for(let i=0;i<grades.length;i++){
let g=parseFloat(grades[i].value);
if(isNaN(g)) continue;

let base=gradeToGPA(g);
let scale=parseFloat(levels[i].value);

tw+=(base/4)*scale;
tu+=base;
count++;
}

document.getElementById("weightedResult").innerText=
"Weighted GPA: "+(tw/count).toFixed(2);

document.getElementById("weightedUnweightedResult").innerText=
"Unweighted GPA: "+(tu/count).toFixed(2);
}


function suggestColleges(){

let gpa=parseFloat(document.getElementById("studentGPA").value);
let major=document.getElementById("major").value;

let result="";

if(gpa>=3.8){
result="<b>Reach:</b> Stanford, MIT<br><b>Target:</b> UT Austin<br><b>Safety:</b> Texas A&M";
}
else if(gpa>=3.5){
result="<b>Reach:</b> UT Austin<br><b>Target:</b> Texas A&M<br><b>Safety:</b> Texas Tech";
}
else{
result="<b>Reach:</b> Texas A&M<br><b>Target:</b> Texas Tech<br><b>Safety:</b> Local State Schools";
}

result+="<br><br><i>Major: "+major+"</i>";

document.getElementById("collegeResults").innerHTML=result;

}

</script>

</body>
</html>
```
