<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Calculator & College Predictor</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:40px;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
}

.course{
    margin-bottom:10px;
}

input, select{
    padding:6px;
    margin-left:5px;
}

button{
    padding:8px 14px;
    margin-top:10px;
    margin-right:5px;
    background:#2a7cff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d5ed6;
}

#gpa{
    font-weight:bold;
    color:#2a7cff;
}

ul{
    padding-left:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 GPA Calculator & College Predictor</h2>

<div id="courses">

<div class="course">
Grade:
<select class="grade">
<option value="4">A</option>
<option value="3">B</option>
<option value="2">C</option>
<option value="1">D</option>
<option value="0">F</option>
</select>

Credits:
<input type="number" class="credits" value="1" min="1">
</div>

</div>

<button onclick="addCourse()">Add Course</button>
<button onclick="calculateGPA()">Calculate GPA</button>

<h3>Your GPA: <span id="gpa">0.00</span></h3>

<h3>Possible Colleges:</h3>
<ul id="collegeList"></ul>

</div>

<script>

function addCourse(){

const container = document.getElementById("courses")

const div = document.createElement("div")
div.className = "course"

div.innerHTML = `
Grade:
<select class="grade">
<option value="4">A</option>
<option value="3">B</option>
<option value="2">C</option>
<option value="1">D</option>
<option value="0">F</option>
</select>

Credits:
<input type="number" class="credits" value="1" min="1">
`

container.appendChild(div)

}

function calculateGPA(){

const grades = document.querySelectorAll(".grade")
const credits = document.querySelectorAll(".credits")

let totalPoints = 0
let totalCredits = 0

for(let i=0;i<grades.length;i++){

let grade = parseFloat(grades[i].value)
let credit = parseFloat(credits[i].value)

totalPoints += grade * credit
totalCredits += credit

}

let gpa = totalPoints / totalCredits

document.getElementById("gpa").innerText = gpa.toFixed(2)

showColleges(gpa)

}

function showColleges(gpa){

const collegeList = document.getElementById("collegeList")
collegeList.innerHTML = ""

let colleges = []

if(gpa >= 3.8){
colleges = [
"Harvard University",
"Stanford University",
"MIT",
"UC Berkeley"
]
}
else if(gpa >= 3.5){
colleges = [
"University of Texas at Austin",
"Boston University",
"University of Florida"
]
}
else if(gpa >= 3.0){
colleges = [
"Texas State University",
"Arizona State University",
"University of Oregon"
]
}
else if(gpa >= 2.5){
colleges = [
"University of North Texas",
"Texas Tech University"
]
}
else{
colleges = [
"Community Colleges",
"Open Enrollment Universities"
]
}

colleges.forEach(college => {

let li = document.createElement("li")
li.textContent = college
collegeList.appendChild(li)

})

}

</script>

</body>
</html>
