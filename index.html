<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weighted GPA Calculator (6.0 Scale)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 40px;
    margin: 0;
  }

  .container {
    max-width: 760px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
  }

  h1, h2, h3 {
    margin-top: 0;
  }

  .course {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }

  label {
    font-size: 0.92rem;
    color: #333;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  input, select, button {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #d3d9df;
    font-size: 0.95rem;
  }

  button {
    background: #2a7cff;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background: #1d5ed6;
  }

  .remove-btn {
    background: #f44336;
    padding: 8px 10px;
  }

  .remove-btn:hover {
    background: #d8342a;
  }

  .controls {
    margin: 14px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  #gpa {
    font-weight: bold;
    color: #2a7cff;
  }

  .note {
    background: #f8fbff;
    border-left: 4px solid #2a7cff;
    padding: 10px 12px;
    margin-bottom: 16px;
    color: #1a3252;
  }

  ul {
    padding-left: 20px;
  }

  @media (max-width: 700px) {
    .course {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎓 Weighted GPA Calculator (6.0 Scale)</h1>
  <p class="note">
    Class weights: <strong>AP = 6.0</strong>, <strong>Advanced/Honors = 5.5</strong>, <strong>On-Level = 5.0</strong>.
    Grade multipliers used: A = 1.0, B = 0.8, C = 0.6, D = 0.4, F = 0.0.
  </p>

  <div id="courses"></div>

  <div class="controls">
    <button type="button" onclick="addCourse()">Add Course</button>
    <button type="button" onclick="calculateGPA()">Calculate Weighted GPA</button>
  </div>

  <h2>Your Weighted GPA (out of 6.0): <span id="gpa">0.00</span></h2>

  <h3>Suggested College Fit</h3>
  <ul id="collegeList"></ul>
</div>

<script>
  const gradeMultipliers = {
    A: 1.0,
    B: 0.8,
    C: 0.6,
    D: 0.4,
    F: 0.0
  };

  const courseLevelMax = {
    ap: 6.0,
    honors: 5.5,
    onlevel: 5.0
  };

  function buildCourseRow() {
    const row = document.createElement("div");
    row.className = "course";

    row.innerHTML = `
      <label>
        Grade
        <select class="grade">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
          <option value="F">F</option>
        </select>
      </label>

      <label>
        Class Type
        <select class="level">
          <option value="ap">AP (max 6.0)</option>
          <option value="honors">Advanced/Honors (max 5.5)</option>
          <option value="onlevel">On-Level (max 5.0)</option>
        </select>
      </label>

      <label>
        Credits
        <input type="number" class="credits" value="1" min="0.5" step="0.5">
      </label>

      <button type="button" class="remove-btn" onclick="removeCourse(this)">Remove</button>
    `;

    return row;
  }

  function addCourse() {
    const container = document.getElementById("courses");
    container.appendChild(buildCourseRow());
  }

  function removeCourse(button) {
    button.closest(".course").remove();
  }

  function calculateGPA() {
    const rows = document.querySelectorAll(".course");

    let totalPoints = 0;
    let totalCredits = 0;

    rows.forEach((row) => {
      const grade = row.querySelector(".grade").value;
      const level = row.querySelector(".level").value;
      const credit = parseFloat(row.querySelector(".credits").value);

      if (!Number.isFinite(credit) || credit <= 0) {
        return;
      }

      const earnedPoints = gradeMultipliers[grade] * courseLevelMax[level];
      totalPoints += earnedPoints * credit;
      totalCredits += credit;
    });

    const gpa = totalCredits === 0 ? 0 : totalPoints / totalCredits;

    document.getElementById("gpa").innerText = gpa.toFixed(2);
    showColleges(gpa);
  }

  function showColleges(gpa) {
    const collegeList = document.getElementById("collegeList");
    collegeList.innerHTML = "";

    let colleges = [];

    if (gpa >= 5.5) {
      colleges = [
        "Reach: Stanford, MIT, Harvard, Princeton",
        "Strong targets: UCLA, UC Berkeley, University of Michigan"
      ];
    } else if (gpa >= 5.0) {
      colleges = [
        "Reach/Target mix: NYU, Boston University, UT Austin",
        "Targets: University of Florida, University of Washington"
      ];
    } else if (gpa >= 4.5) {
      colleges = [
        "Targets: Penn State, Michigan State, Texas Tech",
        "Likely: University of Oregon, Arizona State"
      ];
    } else if (gpa >= 4.0) {
      colleges = [
        "Targets: University of North Texas, University of Houston",
        "Likely: many regional public universities"
      ];
    } else {
      colleges = [
        "Consider: community colleges and open-admission pathways",
        "Build options with strong essays, activities, and test scores"
      ];
    }

    colleges.forEach((college) => {
      const li = document.createElement("li");
      li.textContent = college;
      collegeList.appendChild(li);
    });
  }

  addCourse();
  addCourse();
</script>
</body>
</html>
