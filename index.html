```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>GPA Calculator</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background:#f5f5f7;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

.container{
width:900px;
margin-top:60px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
color:#6e6e73;
margin-bottom:30px;
}

.tabs{
margin-bottom:30px;
}

.tabs button{
background:none;
border:none;
font-size:16px;
margin-right:20px;
cursor:pointer;
padding-bottom:6px;
border-bottom:2px solid transparent;
}

.tabs button.active{
border-color:#0071e3;
color:#0071e3;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

th{
text-align:left;
padding-bottom:10px;
font-size:14px;
color:#6e6e73;
}

td{
padding:8px 0;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d2d2d7;
font-size:14px;
}

button.primary{
background:#0071e3;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
font-size:14px;
cursor:pointer;
margin-right:10px;
}

button.secondary{
background:#f5f5f7;
border:1px solid #d2d2d7;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:500;
}

.tab{
display:none;
}

</style>

</head>



<body>

<div class="container">

<h1>GPA Calculator</h1>
<div class="subtitle">Simple GPA calculator for students</div>


<div class="tabs">
<button id="tab1" onclick="showTab('unweighted')" class="active">Unweighted</button>
<button id="tab2" onclick="showTab('weighted')">Weighted</button>
</div>



<!-- UNWEIGHTED -->

<div id="unweighted" class="tab" style="display:block">

<table id="unweightedTable">

<tr>
<th>Course</th>
<th>Grade (0-100)</th>
</tr>

</table>

<button class="secondary" onclick="addUnweightedCourse()">Add Course</button>
<button class="primary" onclick="calculateUnweighted()">Calculate</button>

<div class="result" id="unweightedResult"></div>

</div>



<!-- WEIGHTED -->

<div id="weighted" class="tab">

<table id="weightedTable">

<tr>
<th>Course</th>
<th>Grade (0-100)</th>
<th>Level</th>
</tr>

</table>

<button class="secondary" onclick="addWeightedCourse()">Add Course</button>
<button class="primary" onclick="calculateWeighted()">Calculate</button>

<div class="result" id="weightedResult"></div>
<div class="result" id="weightedUnweightedResult"></div>

</div>



</div>



<script>

function showTab(tab){

document.getElementById("unweighted").style.display="none";
document.getElementById("weighted").style.display="none";

document.getElementById("tab1").classList.remove("active");
document.getElementById("tab2").classList.remove("active");

document.getElementById(tab).style.display="block";

if(tab==="unweighted"){
document.getElementById("tab1").classList.add("active");
}else{
document.getElementById("tab2").classList.add("active");
}

}



function gradeToGPA(grade){

if(grade>=90) return 4;
if(grade>=80) return 3;
if(grade>=70) return 2;
if(grade>=60) return 1;
return 0;

}



function addUnweightedCourse(){

let table=document.getElementById("unweightedTable");

let row=table.insertRow();

row.innerHTML=`

<td><input placeholder="Course Name"></td>

<td><input type="number" class="uwgrade"></td>

`;

}



function calculateUnweighted(){

let grades=document.querySelectorAll(".uwgrade");

let total=0;
let count=0;

grades.forEach(g=>{

let grade=parseFloat(g.value);

if(!isNaN(grade)){
total+=gradeToGPA(grade);
count++;
}

});

let gpa=total/count;

document.getElementById("unweightedResult").innerText=
"Unweighted GPA: "+gpa.toFixed(2);

}



function addWeightedCourse(){

let table=document.getElementById("weightedTable");

let row=table.insertRow();

row.innerHTML=`

<td><input placeholder="Course Name"></td>

<td><input type="number" class="wgrade"></td>

<td>
<select class="level">
<option value="5">Regular</option>
<option value="5.5">Honors</option>
<option value="6">AP</option>
</select>
</td>

`;

}



function calculateWeighted(){

let grades=document.querySelectorAll(".wgrade");
let levels=document.querySelectorAll(".level");

let totalWeighted=0;
let totalUnweighted=0;
let count=0;

for(let i=0;i<grades.length;i++){

let grade=parseFloat(grades[i].value);

if(isNaN(grade)) continue;

let gpa=gradeToGPA(grade);

let scale=parseFloat(levels[i].value);

let weighted=(gpa/4)*scale;

totalWeighted+=weighted;
totalUnweighted+=gpa;

count++;

}

let weightedGPA=totalWeighted/count;
let unweightedGPA=totalUnweighted/count;

document.getElementById("weightedResult").innerText=
"Weighted GPA: "+weightedGPA.toFixed(2);

document.getElementById("weightedUnweightedResult").innerText=
"Unweighted GPA: "+unweightedGPA.toFixed(2);

}

</script>

</body>

</html>
```
